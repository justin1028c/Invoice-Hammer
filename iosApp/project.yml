# XcodeGen specification for Invoice Hammer (iOS host).
#
# Source of truth for the iOS Xcode project. The generated `iosApp.xcodeproj`
# is gitignored on purpose — regenerate it with `xcodegen generate` (or via
# `bootstrap_ios.sh`) any time this file changes.
#
# This spec validates against the XcodeGen YAML schema:
#   https://github.com/yonaskolb/XcodeGen/blob/master/Docs/ProjectSpec.md

name: iosApp

options:
  bundleIdPrefix: com.fordham
  deploymentTarget:
    iOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top
  defaultConfig: Debug
  xcodeVersion: "15.0"

configs:
  Debug: debug
  Release: release

settings:
  base:
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "14.0"
    ENABLE_BITCODE: "NO"
    ENABLE_USER_SCRIPT_SANDBOXING: "NO"
    ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: "YES"
    CLANG_ENABLE_MODULES: "YES"
    SWIFT_OPTIMIZATION_LEVEL: "-Onone"
  configs:
    Debug:
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
      ONLY_ACTIVE_ARCH: "YES"
    Release:
      SWIFT_OPTIMIZATION_LEVEL: "-O"
      ONLY_ACTIVE_ARCH: "NO"

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: 11.0.0
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: 7.1.0
  Stripe:
    url: https://github.com/stripe/stripe-ios
    from: "24.11.0"

targets:
  iosApp:
    type: application
    platform: iOS
    deploymentTarget: "14.0"
    sources:
      - path: iosApp
        excludes:
          - "Info.plist"
          - "iosApp.entitlements"
          - "GoogleService-Info.plist"
    resources:
      - path: iosApp/GoogleService-Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fordham.toolbelt
        PRODUCT_NAME: iosApp
        INFOPLIST_FILE: iosApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: iosApp/iosApp.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
        IPHONEOS_DEPLOYMENT_TARGET: "14.0"
        SWIFT_VERSION: "5.9"
        ENABLE_BITCODE: "NO"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        POWERPAY_BASE_URL: ""
        POWERPAY_APP_ID: ""
        POWERPAY_PUBLIC_KEY: ""
        POWERPAY_SIGNING_SECRET: ""
        POWERPAY_ENV: "sandbox"
        POWERPAY_API_VARIANT: "sdk"
        SUPABASE_URL: ""
        SUPABASE_ANON_KEY: ""
        SUPABASE_SERVICE_ROLE_KEY: ""
        SUPABASE_SCHEMA: "public"
        GEMINI_MODEL_NAME: "gemini-3.1-flash-lite"
        FOREMAN_GEMINI_BACKEND_URL: ""
        FOREMAN_BACKEND_API_KEY: ""
        GOOGLE_CLIENT_ID: "716278040823-ngqvn2n3td42nrr6nbe4e3jlki348apa.apps.googleusercontent.com"
        STRIPE_PUBLISHABLE_KEY: ""
        STRIPE_PAYMENT_BACKEND_URL: ""
        STRIPE_CONNECT_ONBOARDING_URL: ""
        STRIPE_BACKEND_API_KEY: ""
        STRIPE_APPLICATION_FEE_BPS: "100"
        # The Run Script build phase below invokes the Gradle task
        # `embedAndSignAppleFrameworkForXcode`, which writes ComposeApp.framework
        # to `$(SRCROOT)/../composeApp/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)`
        # and then copies/signs it into the app bundle's Frameworks directory.
        # We link against it via OTHER_LDFLAGS so that XcodeGen does not need
        # the framework binary to exist at generation time.
        FRAMEWORK_SEARCH_PATHS:
          - "$(inherited)"
          - "$(SRCROOT)/../composeApp/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)"
          - "$(BUILT_PRODUCTS_DIR)"
        OTHER_LDFLAGS:
          - "$(inherited)"
          - "-framework"
          - "ComposeApp"
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
    preBuildScripts:
      - name: "Build Kotlin/Native framework"
        # `embedAndSignAppleFrameworkForXcode` reads CONFIGURATION, ARCHS,
        # PLATFORM_NAME, BUILT_PRODUCTS_DIR and TARGET_BUILD_DIR directly
        # from Xcode's environment — do not pass them as -P properties.
        script: |
          set -euo pipefail
          cd "$SRCROOT/.."
          ./gradlew :composeApp:embedAndSignAppleFrameworkForXcode
        inputFiles:
          - "$(SRCROOT)/../composeApp/build.gradle.kts"
          - "$(SRCROOT)/../shared/build.gradle.kts"
          - "$(SRCROOT)/../gradle/libs.versions.toml"
        outputFiles:
          - "$(BUILT_PRODUCTS_DIR)/ComposeApp.framework"
        basedOnDependencyAnalysis: false
        runOnlyWhenInstalling: false
    dependencies:
      - package: Firebase
        product: FirebaseCore
      - package: Firebase
        product: FirebaseAuth
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
      - package: Stripe
        product: StripeCore
      - package: Stripe
        product: StripePaymentSheet

schemes:
  iosApp:
    build:
      targets:
        iosApp: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
