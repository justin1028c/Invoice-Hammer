stages:
  - build
  - deploy

variables:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false"

android-build:
  stage: build
  image: mobiledevops/android-sdk-image:latest
  before_script:
    - export GRADLE_USER_HOME=$(pwd)/.gradle
    # Install JDK 21 to satisfy the jvmToolchain(21) requirement in the public runner
    - apt-get update && apt-get install -y openjdk-21-jdk
  script:
    - ./gradlew clean
    - ./gradlew :secure-vault:apiCheck
    - ./gradlew :secure-vault:testDebugUnitTest
    - ./gradlew :secure-vault:dokkaGeneratePublicationHtml
    - ./gradlew :shared:compileKotlinMetadata
    - ./gradlew :shared:compileDebugKotlinAndroid
    - ./gradlew :androidApp:assembleDebug
  artifacts:
    name: "android-debug-apk"
    paths:
      - app/build/outputs/apk/debug/*.apk
      - secure-vault/build/dokka/html/
    expire_in: 1 week
  cache:
    key: "gradle-android"
    paths:
      - .gradle/wrapper/
      - .gradle/caches/

pages:
  stage: deploy
  dependencies:
    - android-build
  script:
    - mkdir -p public
    - cp -r docs/* public/
    - mkdir -p public/api-docs
    - cp -r secure-vault/build/dokka/html/* public/api-docs/
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
