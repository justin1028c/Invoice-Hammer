stages:
  - build
  - deploy

variables:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false"

android-build:
  stage: build
  image: mobiledevops/android-sdk-image:latest
  before_script:
    - export GRADLE_USER_HOME=$(pwd)/.gradle
  script:
    - ./gradlew clean
    - ./gradlew :secure-vault:apiCheck
    - ./gradlew :secure-vault:testDebugUnitTest
    - ./gradlew :secure-vault:dokkaHtml
    - ./gradlew :shared:compileKotlinMetadata
    - ./gradlew :shared:compileDebugKotlinAndroid
    - ./gradlew :androidApp:assembleDebug
  artifacts:
    name: "android-debug-apk"
    paths:
      - app/build/outputs/apk/debug/*.apk
      - secure-vault/build/dokka/html/
    expire_in: 1 week
  cache:
    key: "gradle-android"
    paths:
      - .gradle/wrapper/
      - .gradle/caches/

ios-build:
  stage: build
  tags:
    - macos
    - shell
    - ios
  before_script:
    - export GRADLE_USER_HOME=$(pwd)/.gradle
    - export JAVA_HOME=$(/usr/libexec/java_home -v 21 || echo "")
  script:
    - brew install xcodegen || true
    - chmod +x iosApp/bootstrap_ios.sh
    - bash iosApp/bootstrap_ios.sh
    - ./gradlew :shared:compileKotlinIosArm64
    - xcodebuild -project iosApp/iosApp.xcodeproj -scheme iosApp -sdk iphonesimulator -configuration Debug build CODE_SIGNING_ALLOWED=NO
  cache:
    key: "gradle-ios"
    paths:
      - .gradle/wrapper/
      - .gradle/caches/

pages:
  stage: deploy
  script:
    - mkdir -p public
    - cp -r docs/* public/
    - mkdir -p public/api-docs
    - cp -r secure-vault/build/dokka/html/* public/api-docs/
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
